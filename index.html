<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main class="page-wrapper">

        <article class="todo-card" data-testid="test-todo-card">

            <!-- Top row:Checkbox + title -->
             <div class="header">
                <input 
                type="checkbox"
                id="todo-complete"
                data-testid="test-todo-complete-toggle"
                aria-label="Mark task as complete"
                >
                <label for="todo-complete" class="sr-only">Mark task as complete</label>
                <h2 class="todo-title" data-testid="test-todo-title">Design the landing page</h2>
             </div>

             <!-- Description -->
              <p class="todo-description" data-testid="test-todo-description">Create a clean, responsive landing page mockup for the cient's new product launch campaign.</p>

              <!-- Priority + status Row -->
               <div class="meta-row">
                    <span class="Priority-badge" data-testid="test-todo-priority" aria-label="Priority">
                        High
                    </span>

                    <span class="status-badge" data-testid="test-todo-status">
                        In Progress
                    </span>
               </div>

               <!-- Due date + Time Remaining -->
                <div class="date-row">
                    <time class="due-date" data-testid="test-todo-due-date" datetime="2026-04-16">Due April 16, 2026</time>
                    <span 
                    class="time-remaining"
                    data-testid="test-todo-time-remaining"
                    aria-live="polite">
                    </span>
                </div>

                <!-- Tags -->
                 <ul class="tags-list" data-testid="test-todo-tags" role="list">
                    <li class="tag" data-testid="test-todo-work">Work</li>
                    <li class="tag" data-testid="test-todo-urgent">Urgent</li>
                    <li class="tag" data-testid="test-todo-design">Design</li>
                 </ul>

                 <!-- Action buttons -->
                  <div class="card-actions">
                    <button 
                    class="btn-edit"
                    data-testid="test-todo-edit-button"
                    aria-label="Edit task"
                    >
                        Edit
                    </button>

                    <button
                    class="btn-delete"
                    data-testid="test-todo-delete-button"
                    aria-label="Delete task"
                    >
                        Delete
                    </button>
                  </div>
        </article>

    </main>

    <script src="main.js"></script>
</body>
</html>
